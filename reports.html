<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>

<div class="logo">
<i class="fa-solid fa-building"></i>
Shiv Apartment
</div>

<nav>

<a href="dashboard.html">Dashboard</a>
<a href="residents.html">Residents</a>
<a href="maintenance.html">Maintenance</a>
<a href="payments.html">Payments</a>
<a href="complaints.html">Complaints</a>
<a href="notice.html">Notice</a>
<a href="documents.html">Documents</a>
<a href="reports.html">Reports</a>

</nav>

</header>

<section class="page-title">

<h1>Society Reports</h1>

<p>Society Summary Report</p>

</section>

<section class="report-header">

    <h2>Society Summary Report</h2>

    <p>
        Generated On :
        <span id="reportDate"></span>
    </p>

    <button onclick="window.print()">
        🖨 Print Report
    </button>

</section>

<section class="report-cards">

<div class="card">
<i class="fa fa-users"></i>
<h3>Total Residents</h3>
<p id="totalResidents">0</p>
</div>

<div class="card">
<i class="fa fa-money-bill"></i>
<h3>Total Collection</h3>
<p id="totalCollection">₹0</p>
</div>

<div class="card">
<i class="fa fa-clock"></i>
<h3>Pending Payments</h3>
<p id="pendingPayments">0</p>
</div>

<div class="card">
<i class="fa fa-exclamation-circle"></i>
<h3>Total Complaints</h3>
<p id="totalComplaints">0</p>
</div>

<div class="card">
<i class="fa fa-bullhorn"></i>
<h3>Total Notices</h3>
<p id="totalNotices">0</p>
</div>

</section>

<script src="js/reports.js"></script>

</body>
</html>
