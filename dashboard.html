<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<script>
    // 🔐 Protection
    if(localStorage.getItem("isLoggedIn") !== "true"){
        window.location.href = "adminlogin.html";
    }
</script>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🏢 Society Admin</h2>

        <a href="#"><i class="fa fa-home"></i> Dashboard</a>
        <a href="residents.html"><i class="fa fa-users"></i> Residents</a>
        <a href="complaints.html"><i class="fa fa-exclamation-circle"></i> Complaints</a>
        <a href="notice.html"><i class="fa fa-bullhorn"></i> Notices</a>
        <a href="maintenance.html"><i class="fa fa-tools"></i> Maintenance</a>
        <a href="#" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h1>Dashboard Overview</h1>

        <!-- CARDS -->
        <div class="cards">

            <div class="card">
                <i class="fa fa-users"></i>
                <h3>Residents</h3>
                <p id="resCount">0</p>
            </div>

            <div class="card">
                <i class="fa fa-exclamation-circle"></i>
                <h3>Complaints</h3>
                <p id="compCount">0</p>
            </div>

            <div class="card">
                <i class="fa fa-bullhorn"></i>
                <h3>Notices</h3>
                <p id="noticeCount">0</p>
            </div>

            <div class="card">
                <i class="fa fa-money-bill"></i>
                <h3>Total Collection</h3>
                <p id="collection">₹0</p>
            </div>

        </div>

        <!-- RECENT SECTION -->
        <div class="table-box">
            <h2>Quick Summary</h2>
            <p>Welcome to Society Management Dashboard 🚀</p>
        </div>

    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
